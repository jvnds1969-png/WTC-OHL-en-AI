<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTC OHL ontdekt nieuwe paden</title>
  <meta name="description" content="Een toegankelijke en stijlvolle introductie tot AI voor nieuwsgierige leden van WTC OHL — met praktische tools, herkenbare vergelijkingen en een uitnodiging om samen te leren." />
  <meta property="og:title" content="WTC OHL ontdekt nieuwe paden" />
  <meta property="og:description" content="Wegwijs in AI voor wie graag bijleert — een warme, toegankelijke one-pager voor WTC OHL." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);
      --text-hero: clamp(3rem, 0.5rem + 7vw, 7rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      --space-24: 6rem;
      --space-32: 8rem;

      --color-bg: #f7f4ee;
      --color-surface: #fbfaf7;
      --color-surface-2: #f2eee7;
      --color-surface-offset: #ece7de;
      --color-surface-dynamic: #e1dbd0;
      --color-divider: #d7d0c6;
      --color-border: #cec7bc;
      --color-text: #221f1a;
      --color-text-muted: #67625b;
      --color-text-faint: #918a80;
      --color-text-inverse: #f8f5ef;
      --color-primary: #0a666a;
      --color-primary-hover: #0a5054;
      --color-primary-active: #073d40;
      --color-primary-highlight: #d7e7e5;
      --color-success: #4f6d2d;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.85rem;
      --radius-xl: 1.2rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 10px 30px oklch(0.2 0.01 80 / 0.09);
      --shadow-lg: 0 18px 50px oklch(0.2 0.01 80 / 0.12);
      --content-narrow: 720px;
      --content-default: 1100px;
      --content-wide: 1240px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Inter', 'Segoe UI', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #141311;
      --color-surface: #1b1917;
      --color-surface-2: #24211d;
      --color-surface-offset: #2c2824;
      --color-surface-dynamic: #37322c;
      --color-divider: #322f2a;
      --color-border: #46413b;
      --color-text: #ece6de;
      --color-text-muted: #bbb2a6;
      --color-text-faint: #8d857a;
      --color-text-inverse: #171411;
      --color-primary: #6cb5b7;
      --color-primary-hover: #8bc9cb;
      --color-primary-active: #4f989b;
      --color-primary-highlight: #233435;
      --color-success: #8bb363;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.22);
      --shadow-md: 0 10px 30px oklch(0 0 0 / 0.32);
      --shadow-lg: 0 18px 50px oklch(0 0 0 / 0.45);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg: #141311;
        --color-surface: #1b1917;
        --color-surface-2: #24211d;
        --color-surface-offset: #2c2824;
        --color-surface-dynamic: #37322c;
        --color-divider: #322f2a;
        --color-border: #46413b;
        --color-text: #ece6de;
        --color-text-muted: #bbb2a6;
        --color-text-faint: #8d857a;
        --color-text-inverse: #171411;
        --color-primary: #6cb5b7;
        --color-primary-hover: #8bc9cb;
        --color-primary-active: #4f989b;
        --color-primary-highlight: #233435;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
      scroll-padding-top: var(--space-20);
    }
    body {
      min-height: 100dvh;
      line-height: 1.6;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, color-mix(in oklab, var(--color-primary) 8%, transparent), transparent 32%),
        linear-gradient(180deg, var(--color-bg) 0%, var(--color-surface) 100%);
    }
    img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
    input, button, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; background: none; border: none; }
    a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive), transform var(--transition-interactive);
    }
    p, li { text-wrap: pretty; }
    h1, h2, h3 { text-wrap: balance; line-height: 1.04; }
    ::selection { background: color-mix(in oklab, var(--color-primary) 26%, transparent); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    .skip-link {
      position: absolute;
      left: var(--space-4);
      top: -3rem;
      background: var(--color-primary);
      color: var(--color-text-inverse);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-full);
      z-index: 100;
    }
    .skip-link:focus { top: var(--space-4); }

    .container {
      width: min(calc(100% - 2rem), var(--content-default));
      margin-inline: auto;
    }
    .narrow { width: min(calc(100% - 2rem), var(--content-narrow)); margin-inline: auto; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: color-mix(in oklab, var(--color-bg) 88%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      min-height: 4.5rem;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .brand-mark {
      width: 2rem;
      height: 2rem;
      color: var(--color-primary);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .nav-links {
      display: none;
      gap: var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .nav-links a:hover { color: var(--color-primary); }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
      background: color-mix(in oklab, var(--color-surface) 86%, transparent);
    }
    .theme-toggle:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

    .hero {
      padding: clamp(var(--space-16), 9vw, var(--space-32)) 0 var(--space-12);
    }
    .hero-grid {
      display: grid;
      gap: var(--space-8);
      align-items: end;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      color: var(--color-primary-active);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: var(--space-5);
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(3.2rem, 8vw, 6.8rem);
      margin-bottom: var(--space-5);
      max-width: 11ch;
    }
    .hero p {
      max-width: 62ch;
      color: var(--color-text-muted);
      font-size: var(--text-lg);
    }
    .hero-stack {
      display: grid;
      gap: var(--space-5);
    }
    .hero-card,
    .hero-photo,
    .quote-panel,
    .callout,
    .tool-card,
    .choice-panel,
    .challenge-card,
    .photo-rail,
    .deep-dive {
      background: color-mix(in oklab, var(--color-surface) 94%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }
    .hero-card {
      position: relative;
      padding: var(--space-8);
      background: linear-gradient(160deg, color-mix(in oklab, var(--color-surface) 88%, white 12%), var(--color-surface-2));
      overflow: hidden;
      isolation: isolate;
    }
    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -20% -35% auto;
      width: 16rem;
      aspect-ratio: 1;
      background: radial-gradient(circle, color-mix(in oklab, var(--color-primary) 22%, transparent), transparent 65%);
      z-index: -1;
    }
    .hero-photo {
      overflow: hidden;
      min-height: 420px;
      box-shadow: var(--shadow-md);
    }
    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-photo figcaption {
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      border-top: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
      background: color-mix(in oklab, var(--color-surface) 92%, transparent);
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-6);
    }
    .stat {
      padding-top: var(--space-4);
      border-top: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
    }
    .stat strong {
      display: block;
      font-size: var(--text-lg);
      margin-bottom: var(--space-1);
    }
    .stat span {
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .quick-map {
      display: grid;
      gap: var(--space-4);
      margin-top: var(--space-6);
      padding: var(--space-5);
      border-radius: var(--radius-lg);
      background: color-mix(in oklab, var(--color-primary-highlight) 40%, var(--color-surface));
    }
    .quick-map p {
      color: var(--color-text);
      font-size: var(--text-sm);
    }
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .quick-links a {
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius-full);
      background: color-mix(in oklab, var(--color-surface) 88%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      font-size: var(--text-sm);
      color: var(--color-text);
    }
    .quick-links a:hover {
      color: var(--color-primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    main section {
      padding: clamp(var(--space-10), 6vw, var(--space-20)) 0;
      content-visibility: auto;
      contain-intrinsic-size: 1px 1200px;
    }

    .section-header {
      display: grid;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .section-header h2 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      max-width: 12ch;
    }
    .section-header p {
      max-width: 60ch;
      color: var(--color-text-muted);
    }

    .intro-layout {
      display: grid;
      gap: var(--space-6);
    }
    .essay {
      display: grid;
      gap: var(--space-5);
    }
    .essay p {
      max-width: 68ch;
    }
    .lead-in {
      font-size: var(--text-lg);
      color: var(--color-text);
    }
    .quote-panel {
      padding: var(--space-8);
      background: linear-gradient(180deg, color-mix(in oklab, var(--color-primary-highlight) 54%, var(--color-surface)), var(--color-surface));
      display: grid;
      gap: var(--space-5);
    }
    .quote-panel p {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      max-width: 12ch;
    }
    .quote-panel small {
      display: block;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: var(--text-xs);
    }

    .photo-rail {
      overflow: hidden;
      display: grid;
      gap: 0;
    }
    .photo-rail img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .photo-rail figcaption {
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      background: color-mix(in oklab, var(--color-surface) 94%, transparent);
    }

    .callout {
      padding: var(--space-8);
      display: grid;
      gap: var(--space-4);
    }
    .callout h3,
    .tools-title,
    .challenge-card h3,
    .choice-panel h3,
    .deep-dive summary {
      font-size: var(--text-lg);
      line-height: 1.2;
    }
    .callout ul,
    .challenge-card ol {
      list-style: none;
      display: grid;
      gap: var(--space-3);
    }
    .callout li,
    .challenge-card li {
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
      color: var(--color-text-muted);
    }
    .dot,
    .step {
      flex: 0 0 auto;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-primary-highlight);
      color: var(--color-primary-active);
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: 0.08rem;
    }

    .deep-dive {
      margin-top: var(--space-6);
      overflow: hidden;
    }
    .deep-dive summary {
      list-style: none;
      cursor: pointer;
      padding: var(--space-5) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      font-weight: 700;
    }
    .deep-dive summary::-webkit-details-marker { display: none; }
    .deep-dive summary::after {
      content: "+";
      font-size: 1.4rem;
      color: var(--color-primary);
      line-height: 1;
    }
    .deep-dive[open] summary::after { content: "−"; }
    .deep-dive-body {
      padding: 0 var(--space-6) var(--space-6);
      display: grid;
      gap: var(--space-4);
      color: var(--color-text-muted);
    }
    .deep-dive-body p,
    .deep-dive-body li {
      max-width: 68ch;
    }
    .deep-dive-body ul {
      padding-left: 1.1rem;
      display: grid;
      gap: var(--space-2);
    }

    .tools-grid {
      display: grid;
      gap: var(--space-5);
      grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
    }
    .tool-card {
      padding: var(--space-6);
      display: grid;
      gap: var(--space-4);
      background: linear-gradient(180deg, color-mix(in oklab, var(--color-surface) 90%, white 10%), var(--color-surface));
    }
    .tool-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }
    .tool-name {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-weight: 700;
      font-size: var(--text-base);
    }
    .tool-badge {
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: var(--color-surface-offset);
      color: var(--color-text-muted);
    }
    .icon-wrap {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in oklab, var(--color-primary) 11%, var(--color-surface));
      color: var(--color-primary);
    }
    .tool-card p,
    .tool-card li,
    .choice-panel p,
    .challenge-card p {
      color: var(--color-text-muted);
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .meta span {
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius-full);
      background: color-mix(in oklab, var(--color-surface-offset) 82%, transparent);
      font-size: var(--text-xs);
    }
    .tool-card ul {
      list-style: none;
      display: grid;
      gap: var(--space-2);
      font-size: var(--text-sm);
    }
    .tool-card li::before {
      content: "— ";
      color: var(--color-primary);
    }

    .comparison {
      overflow: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      box-shadow: var(--shadow-sm);
      background: var(--color-surface);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }
    th, td {
      text-align: left;
      padding: var(--space-4);
      border-bottom: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      vertical-align: top;
    }
    th {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      background: color-mix(in oklab, var(--color-surface-2) 88%, transparent);
    }
    tr:last-child td { border-bottom: none; }

    .choice-grid {
      display: grid;
      gap: var(--space-5);
      grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
      align-items: start;
    }
    .choice-panel {
      padding: var(--space-6);
      display: grid;
      gap: var(--space-4);
    }
    .priority-list {
      list-style: none;
      display: grid;
      gap: var(--space-3);
    }
    .priority-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
    }
    .priority-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      color: var(--color-primary-active);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .split-band {
      display: grid;
      gap: var(--space-5);
      align-items: stretch;
      margin-top: var(--space-8);
    }

    .challenge-card {
      padding: clamp(var(--space-8), 5vw, var(--space-12));
      display: grid;
      gap: var(--space-5);
      position: relative;
      overflow: hidden;
      background: linear-gradient(140deg, color-mix(in oklab, var(--color-primary-highlight) 55%, var(--color-surface)), var(--color-surface));
    }
    .challenge-card::after {
      content: "";
      position: absolute;
      width: 16rem;
      aspect-ratio: 1;
      right: -4rem;
      bottom: -5rem;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in oklab, var(--color-primary) 20%, transparent), transparent 70%);
      pointer-events: none;
    }
    .challenge-grid {
      display: grid;
      gap: var(--space-6);
    }
    .challenge-note {
      font-size: var(--text-lg);
      max-width: 46ch;
    }

    .closing-gallery {
      display: grid;
      gap: var(--space-4);
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: var(--space-8);
    }
    .closing-gallery figure {
      overflow: hidden;
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      box-shadow: var(--shadow-sm);
    }
