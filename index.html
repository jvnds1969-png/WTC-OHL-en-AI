<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTC OHL ontdekt nieuwe paden</title>
  <meta name="description" content="Wegwijs in AI voor wie graag bijleert — een warme, toegankelijke one-pager voor WTC OHL." />
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #fffdf8;
      --text: #1f2a2e;
      --muted: #5c6b70;
      --line: #d8d3ca;
      --accent: #1f6f78;
      --accent-2: #d8ebe7;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f7f4ee 0%, #efebe3 100%);
      line-height: 1.6;
    }

    .wrap {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    header.hero {
      padding: 72px 0 40px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .hero-copy {
      background: rgba(255, 253, 248, 0.8);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: var(--accent-2);
      color: var(--accent);
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 24px;
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 58ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn.primary {
      background: var(--accent);
      color: white;
    }

    .btn.secondary {
      background: transparent;
      color: var(--accent);
      border-color: var(--line);
    }

    .hero-visual img {
      width: 100%;
      height: min(72vw, 540px);
      object-fit: cover;
      border-radius: 28px;
      box-shadow: var(--shadow);
      display: block;
    }

    section {
      padding: 26px 0 34px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }
