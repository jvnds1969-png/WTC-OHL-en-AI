<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTC OHL ontdekt nieuwe paden</title>
  <meta name="description" content="Wegwijs in AI voor wie graag bijleert — een warme, toegankelijke one-pager voor WTC OHL." />
  <style>
    :root{
      --bg:#f5f1ea;
      --paper:#fffdf9;
      --text:#223036;
      --muted:#607177;
      --line:#ddd6cc;
      --accent:#1e6f78;
      --accent-soft:#deece8;
      --max:1080px;
      --radius:18px;
      --shadow:0 10px 30px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f8f5ef 0%,#f0ebe3 100%);
      line-height:1.7;
    }

    .wrap{
      width:min(var(--max),calc(100% - 28px));
      margin:0 auto;
    }

    header{
      padding:64px 0 30px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:24px;
      align-items:center;
    }

    .hero-copy,
    .card,
    .quote,
    .mini-gallery,
    .footer-box{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .hero-copy{
      padding:30px;
    }

    .tag{
      display:inline-block;
      background:var(--accent-soft);
      color:var(--accent);
      border-radius:999px;
      padding:7px 12px;
      font-size:14px;
      font-weight:bold;
      margin-bottom:14px;
    }

    h1,h2,h3{
      line-height:1.12;
      margin-top:0;
      color:#1c2a2f;
    }

    h1{
      font-size:clamp(2.2rem,5vw,4.3rem);
      margin-bottom:14px;
    }

    h2{
      font-size:clamp(1.5rem,3vw,2.2rem);
      margin-bottom:12px;
    }

    p{
      margin:0 0 14px;
      max-width:72ch;
    }

    .lead{
      font-size:1.08rem;
      color:var(--muted);
    }

    .hero-image img,
    .split-image img,
    .mini-gallery img,
    .bottom-grid img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .hero-image{
      height:100%;
      min-height:340px;
      overflow:hidden;
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    main section{
      padding:20px 0;
    }
